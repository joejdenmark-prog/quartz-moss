<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0a0402">
<title>Lava River</title>
<style>
  *,*::before,*::after{ margin:0; padding:0; box-sizing:border-box; }
  html,body{
    width:100%; height:100%; overflow:hidden;
    background:#0a0402;
    font-family:system-ui,-apple-system,sans-serif;
    -webkit-tap-highlight-color:transparent;
  }
  #canvas{
    display:block; width:100%; height:100%;
    touch-action:none; -webkit-tap-highlight-color:transparent; user-select:none;
  }
  #vignette{
    position:fixed; inset:0; pointer-events:none; z-index:5;
    background:radial-gradient(ellipse 100% 90% at 50% 45%,
      transparent 45%, rgba(0,0,0,0.35) 78%, rgba(0,0,0,0.72) 100%);
  }
  #fps{
    position:fixed; top:8px; left:8px; z-index:9999;
    font:12px/1.4 monospace; color:#ff8a4a;
    background:rgba(10,4,2,0.55); padding:4px 8px; border-radius:4px;
    pointer-events:none; white-space:pre;
  }
  #reset-btn{
    position:fixed; bottom:24px; right:24px; width:46px; height:46px;
    border-radius:50%;
    border:1px solid rgba(255,110,60,0.35);
    background:rgba(20,6,4,0.72);
    color:rgba(255,140,90,0.9);
    font-size:22px; line-height:1;
    display:flex; align-items:center; justify-content:center;
    cursor:pointer;
    backdrop-filter:blur(6px); -webkit-backdrop-filter:blur(6px);
    transition:opacity .25s ease, transform .14s ease;
    opacity:.6; z-index:100; user-select:none;
    -webkit-tap-highlight-color:transparent; touch-action:manipulation;
  }
  #reset-btn:hover  { opacity:1; }
  #reset-btn:active { transform:scale(.9); opacity:1; }
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<div id="vignette"></div>
<div id="fps">-- fps</div>
<button id="reset-btn" title="Reset">↺</button>

<script type="importmap">
{ "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js" } }
</script>
<script type="module">
import * as THREE from 'three';

// ── Seeded RNG ───────────────────────────────────────────────────────────────
function mulberry32(seed){
  return function(){
    seed |= 0; seed = (seed + 0x6D2B79F5) | 0;
    let t = Math.imul(seed ^ (seed >>> 15), 1 | seed);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}
const rng   = mulberry32(0x1a7a51);
const range = (a,b) => a + rng() * (b - a);
function smoothstepJS(a,b,x){ const t = Math.min(1, Math.max(0, (x-a)/(b-a))); return t*t*(3-2*t); }

// ── Renderer / scene / camera (orthographic, straight top-down) ─────────────
// Use visualViewport when available — on iOS Safari, window.innerWidth/Height
// can mismatch the actual visible area when the address/toolbar collapses or
// expands, which throws off both the canvas size and touch coordinate mapping.
function getViewportSize(){
  if (window.visualViewport) {
    return { w: window.visualViewport.width, h: window.visualViewport.height };
  }
  return { w: window.innerWidth, h: window.innerHeight };
}

let { w: W, h: H } = getViewportSize();
const canvas = document.getElementById('canvas');
const isMobile = window.matchMedia('(pointer: coarse)').matches;

const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(isMobile ? Math.min(window.devicePixelRatio, 1.5) : Math.min(window.devicePixelRatio, 2));
canvas.style.width = W + 'px';
canvas.style.height = H + 'px';
renderer.setSize(W, H);
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.05;
renderer.shadowMap.enabled = false;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x080302);

const ORTHO_H = 9;
const camera = new THREE.OrthographicCamera(
  -(W / H) * ORTHO_H, (W / H) * ORTHO_H,
  ORTHO_H, -ORTHO_H,
  0.1, 100
);
camera.up.set(0, 0, -1);
camera.position.set(0, 20, 0);
camera.lookAt(0, 0, 0);

let resizeTimer;
function handleViewportResize(){
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => {
    const size = getViewportSize();
    W = size.w; H = size.h;
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    camera.left   = -(W / H) * ORTHO_H;
    camera.right  =  (W / H) * ORTHO_H;
    camera.top    =  ORTHO_H;
    camera.bottom = -ORTHO_H;
    camera.updateProjectionMatrix();
    renderer.setSize(W, H);
  }, 250);
}
window.addEventListener('resize', handleViewportResize);
if (window.visualViewport) {
  window.visualViewport.addEventListener('resize', handleViewportResize);
}

// ── Lights ────────────────────────────────────────────────────────────────────
scene.add(new THREE.HemisphereLight(0x3a2010, 0x040201, 1.4));
const sun = new THREE.DirectionalLight(0xffa070, 0.95);
sun.position.set(-6, 14, 4);
sun.color.set(0xffe0c0);
sun.intensity = 1.8;
scene.add(sun);
const fillLight = new THREE.DirectionalLight(0x3a1a10, 0.20);
fillLight.position.set(5, 8, -6);
scene.add(fillLight);
const rimLight = new THREE.DirectionalLight(0x1a0a05, 0.45);
rimLight.position.set(8, 6, 8);
scene.add(rimLight);

// ── River path shape (centerline + width, in world units) ───────────────────
const HW = camera.right;                      // half visible width at startup
const BOUNDS_X = HW * 7.2 + 18;                // boulder field half-width — comfortably past the visible edges on both sides
const baseHalfWidth = HW * 0.50;
const widthVar      = HW * 0.035;
const ampA = HW * 0.22, ampB = HW * 0.09;
function centerX(z){ return Math.sin(z*0.34+1.3)*ampA + Math.sin(z*0.15+0.6)*ampB; }
function halfWidth(z){ return baseHalfWidth + Math.sin(z*0.19+2.1)*widthVar; }

const RIVER_LENGTH = ORTHO_H * 3.6;
const Z0 = -RIVER_LENGTH / 2;
const EDGE_BLEED = 0.75; // extra lava width hidden under the innermost boulder ring

// ── Lava river mesh + shader ──────────────────────────────────────────────────
function buildRiverGeometry(edgeBleed){
  const LEN_SEG = 90, WID_SEG = 14;
  const positions = [], uvs = [], indices = [];
  for (let i = 0; i <= LEN_SEG; i++) {
    const t = i / LEN_SEG;
    const z = Z0 + t * RIVER_LENGTH;
    const cx = centerX(z);
    const hw = halfWidth(z) + edgeBleed;
    for (let j = 0; j <= WID_SEG; j++) {
      const s = j / WID_SEG;
      positions.push(cx + (s - 0.5) * 2 * hw, 0, z);
      uvs.push(s, t);
    }
  }
  const rowLen = WID_SEG + 1;
  for (let i = 0; i < LEN_SEG; i++) {
    for (let j = 0; j < WID_SEG; j++) {
      const a = i*rowLen+j, b = a+1, c = a+rowLen, d = c+1;
      indices.push(a,c,b, b,c,d);
    }
  }
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
  geo.setAttribute('uv', new THREE.Float32BufferAttribute(uvs, 2));
  geo.setIndex(indices);
  return geo;
}

const MAX_TOUCH = 4;
const lavaMaterial = new THREE.ShaderMaterial({
  uniforms: {
    uTime: { value: 0 },
  },
  vertexShader: `
    varying vec2 vUv;
    varying vec3 vWorldPos;
    void main(){
      vUv = uv;
      vec4 wp = modelMatrix * vec4(position, 1.0);
      vWorldPos = wp.xyz;
      gl_Position = projectionMatrix * viewMatrix * wp;
    }
  `,
  fragmentShader: `
    precision mediump float;
    varying vec2 vUv;
    varying vec3 vWorldPos;
    uniform float uTime;

    float hash(vec2 p){ return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5453123); }
    float noise(vec2 p){
      vec2 i = floor(p), f = fract(p);
      float a = hash(i), b = hash(i+vec2(1.0,0.0));
      float c = hash(i+vec2(0.0,1.0)), d = hash(i+vec2(1.0,1.0));
      vec2 u = f*f*(3.0-2.0*f);
      return mix(mix(a,b,u.x), mix(c,d,u.x), u.y);
    }
    float fbm2(vec2 p){
      float v = 0.0, a = 0.5;
      for(int i=0;i<2;i++){ v += a*noise(p); p *= 2.02; a *= 0.5; }
      return v;
    }
    float fbm(vec2 p){
      float v = 0.0, a = 0.5;
      for(int i=0;i<4;i++){ v += a*noise(p); p *= 2.02; a *= 0.5; }
      return v;
    }

    void main(){
      // domain-warped turbulence — reads as a viscous flowing surface
      // rather than a smooth glowing mist.
      vec2 flowUv = vUv*vec2(3.2,9.0) + vec2(uTime*0.02, -uTime*0.28);
      vec2 warp = vec2(fbm2(flowUv*1.4 + 5.2), fbm2(flowUv*1.4 - 3.7)) - 0.5;
      vec2 p1 = flowUv + warp*1.1;
      float n1 = fbm(p1);
      vec2 p2 = vUv*vec2(6.5,17.0) - vec2(uTime*0.018, uTime*0.24) + warp*0.7;
      float n2 = fbm(p2);

      // thin dark solidified-crust veins threaded through the flow
      float crustN = fbm(vUv*vec2(9.5,23.0) + warp*1.6 + vec2(uTime*0.010, -uTime*0.045));
      float crust = smoothstep(0.40,0.5,crustN) - smoothstep(0.5,0.60,crustN);

      float veins = smoothstep(0.56, 0.80, n1*0.6 + n2*0.4);

      vec3 darkBase   = vec3(0.36,0.016,0.009);
      vec3 midBase    = vec3(0.52,0.028,0.014);
      vec3 brightVein = vec3(0.58,0.15,0.045);
      vec3 crustColor = vec3(0.185,0.0088,0.0048);

      vec3 col = mix(darkBase, midBase, n1);
      col = mix(col, brightVein, veins*0.22);
      col = mix(col, crustColor, clamp(crust,0.0,1.0)*0.75);

      float c = abs(vUv.x-0.5)*2.0;

      // sharpen the riverbank — crust down hard right at the true (un-bled) edge
      float hw = ${baseHalfWidth.toFixed(6)} + sin(vWorldPos.z*0.19+2.1)*${widthVar.toFixed(6)};
      float meshHw = hw + ${EDGE_BLEED.toFixed(6)};
      float edgeFrac = hw/meshHw;
      float bank = smoothstep(edgeFrac*0.62, edgeFrac*1.05, c);
      col = mix(col, crustColor*0.6, bank*0.95);

      // absolute brightness floor — the darkest parts of the flow must never
      // read as near-black, regardless of bank/crust darkening.
      col.r = max(col.r, 0.22);

      gl_FragColor = vec4(col, 1.0);
    }
  `,
});

const lavaGeo = buildRiverGeometry(EDGE_BLEED);
const lavaMesh = new THREE.Mesh(lavaGeo, lavaMaterial);
scene.add(lavaMesh);

// A second, un-bled geometry defines the "true" river edge used to keep
// boulders and bubbles clear of the flow — the bleed is purely a visual
// strip that peeks through the gaps of the innermost boulder ring.
function riverHalfWidthNominal(z){ return halfWidth(z); }

// ── Ground plane (cooled rock bed beneath the boulder field) ─────────────────
const groundGeo = new THREE.PlaneGeometry(BOUNDS_X*2 + 4, RIVER_LENGTH + ORTHO_H*2.4);
groundGeo.rotateX(-Math.PI/2);
const groundMat = new THREE.MeshStandardMaterial({ color: 0x4a1a0a, roughness: 1.0, metalness: 0.0, emissive: new THREE.Color(0x1a0000), emissiveIntensity: 0.8 });
const groundMesh = new THREE.Mesh(groundGeo, groundMat);
groundMesh.position.y = -0.03;
scene.add(groundMesh);

// ── Boulders (dense instanced field along the river banks) ──────────────────
// Multi-tier scatter: large boulders first, then medium — each later pass
// fills the gaps the previous pass left, so the banks read as dense packed
// rock rather than pebbles scattered on black ground. Positions must exist
// before texture generation below, since visible-boulder textures are keyed
// off each boulder's final (x,z).
const boulderDefs = [];
const BOULDER_Z_MARGIN = ORTHO_H * 1.2; // extra reach past the river's ends so far top/bottom edges never show bare ground

function inRiver(x, z, buffer){
  return Math.abs(x - centerX(z)) < riverHalfWidthNominal(z) + buffer;
}
// Uniform spatial hash for collision checks — with tens of thousands of
// candidates in the dense filler pass, a linear scan against every existing
// boulder would be far too slow, so neighbors are looked up by grid cell
// instead. Cell size comfortably exceeds the largest possible collision
// radius so only the 3x3 neighborhood ever needs checking.
const COLLISION_CELL = 2.6;
const collisionGrid = new Map();
function cellKey(gx, gz){ return gx + ',' + gz; }
function addToGrid(idx){
  const b = boulderDefs[idx];
  const key = cellKey(Math.floor(b.x/COLLISION_CELL), Math.floor(b.z/COLLISION_CELL));
  let bucket = collisionGrid.get(key);
  if (!bucket) { bucket = []; collisionGrid.set(key, bucket); }
  bucket.push(idx);
}
function tooClose(x, z, radius, factor){
  const gx = Math.floor(x/COLLISION_CELL), gz = Math.floor(z/COLLISION_CELL);
  for (let dx = -1; dx <= 1; dx++) {
    for (let dz = -1; dz <= 1; dz++) {
      const bucket = collisionGrid.get(cellKey(gx+dx, gz+dz));
      if (!bucket) continue;
      for (const idx of bucket) {
        const b = boulderDefs[idx];
        const ddx = x - b.x, ddz = z - b.z;
        const minDist = (radius + b.radius) * factor;
        if (ddx*ddx + ddz*ddz < minDist*minDist) return true;
      }
    }
  }
  return false;
}
function scatterTier(cell, riverBuffer, radiusMin, radiusMax, packFactor, xMin, xMax, zMin, zMax){
  if (xMin === undefined) xMin = -BOUNDS_X;
  if (xMax === undefined) xMax = BOUNDS_X;
  if (zMin === undefined) zMin = Z0 - BOULDER_Z_MARGIN;
  if (zMax === undefined) zMax = Z0 + RIVER_LENGTH + BOULDER_Z_MARGIN;
  for (let z = zMin; z <= zMax; z += cell) {
    for (let x = xMin; x <= xMax; x += cell) {
      const jx = x + range(-cell*0.42, cell*0.42);
      const jz = z + range(-cell*0.42, cell*0.42);
      const radius = range(radiusMin, radiusMax);
      // Scale the river exclusion by this boulder's own radius so large
      // rocks can't visually intrude deep into the flow near the bank.
      if (inRiver(jx, jz, riverBuffer + radius*0.40)) continue;
      if (Math.abs(jx) > BOUNDS_X) continue;
      if (tooClose(jx, jz, radius, packFactor)) continue;
      boulderDefs.push({ x: jx, z: jz, radius });
      addToGrid(boulderDefs.length - 1);
    }
  }
}

scatterTier(1.30, 0.16, 0.75, 1.45, 0.62); // large
scatterTier(0.62, 0.12, 0.45, 0.75, 0.68); // medium

// ── Boulder shape — heavily-jittered low-poly sphere reads as an irregular
// lumpy rock rather than a faceted polyhedron; normals stay smooth
// (flatShading: false) so the surface texture (not hard facet edges) carries
// the detail.
const boulderGeo = new THREE.SphereGeometry(1, 10, 8);
{
  const jrng = mulberry32(0x9e3b7a);
  const pos = boulderGeo.attributes.position;
  for (let i = 0; i < pos.count; i++) {
    const jitter = 1 + (jrng() - 0.5) * 0.45;
    pos.setXYZ(i, pos.getX(i)*jitter, pos.getY(i)*jitter, pos.getZ(i)*jitter);
  }
  pos.needsUpdate = true;
  boulderGeo.computeVertexNormals();
}

// ── Boulder surface + crack texture atlas ────────────────────────────────────
// Each boulder inside the visible viewport gets a unique baked texture
// (porous rock surface + carved crack grooves); every boulder outside it
// shares one generic texture, since it's never seen closely enough to need
// individual detail. All of these are packed into a single shared atlas so
// every boulder — visible or not — stays in the one InstancedMesh; tap/crack
// raycasting keeps working off plain instanceId, exactly as before.
const CRACK_SEED_SALT = 7919;

// Same seeded random-walk branch generator feeds both the baked groove
// texture and the separate glow texture, so their crack patterns line up
// pixel-for-pixel.
function generateCrackPaths(seed, cx, cy, radius){
  const rng = mulberry32(seed >>> 0);
  const r = (a, b) => a + rng() * (b - a);
  const branches = 4 + Math.floor(r(0, 4));
  const paths = [];
  // distance-along-path (from the crack's origin) drives the tap fill-reveal
  // below — every point gets one, then it's normalized to 0..1 by the
  // longest reach across all branches, so the fill sweeps outward from the
  // origin at a uniform rate regardless of which branch it's traveling down.
  let maxReach = 0.0001;
  for (let i = 0; i < branches; i++) {
    const isAngular = rng() > 0.5;
    const ang = (i / branches) * Math.PI * 2 + r(-0.6, 0.6);
    const len = radius * r(0.7, 1.3);
    const segs = isAngular ? 3 + Math.floor(r(0, 2)) : 6 + Math.floor(r(0, 4));
    const pts = [{ x: cx, y: cy, d: 0 }];
    let x = cx, y = cy, a = ang, cumLen = 0;
    for (let s = 0; s < segs; s++) {
      if (isAngular) {
        a += r(-0.3, 0.3);
      } else {
        a += r(-0.5, 0.5);
      }
      const step = len / segs;
      x += Math.cos(a) * step;
      y += Math.sin(a) * step;
      cumLen += step;
      pts.push({ x, y, d: cumLen });
    }
    maxReach = Math.max(maxReach, cumLen);
    // sub-branches
    if (rng() > 0.5) {
      const midIdx = Math.floor(pts.length / 2);
      const midPt = pts[midIdx];
      const subAng = ang + r(0.4, 1.0) * (rng() > 0.5 ? 1 : -1);
      const subLen = len * r(0.3, 0.6);
      const subSegs = 3 + Math.floor(r(0, 2));
      const subPts = [{ x: midPt.x, y: midPt.y, d: midPt.d }];
      let sx = midPt.x, sy = midPt.y, sa = subAng, subCumLen = midPt.d;
      for (let s = 0; s < subSegs; s++) {
        sa += r(-0.4, 0.4);
        const step = subLen / subSegs;
        sx += Math.cos(sa) * step;
        sy += Math.sin(sa) * step;
        subCumLen += step;
        subPts.push({ x: sx, y: sy, d: subCumLen });
      }
      maxReach = Math.max(maxReach, subCumLen);
      paths.push(subPts);
    }
    paths.push(pts);
  }
  for (const pts of paths) for (const p of pts) p.d /= maxReach;
  return paths;
}

function makeBoulderTexture(seed, isVisible){
  const size = 256;
  const cnv = document.createElement('canvas');
  cnv.width = cnv.height = size;
  const ctx = cnv.getContext('2d');
  const trng = mulberry32(seed >>> 0);

  ctx.fillStyle = '#0a0907';
  ctx.fillRect(0, 0, size, size);

  // porous surface: scattered tiny dark pits
  const pitCount = 500;
  for (let i = 0; i < pitCount; i++) {
    const x = trng()*size, y = trng()*size, r = 1 + trng()*3;
    ctx.fillStyle = '#030202';
    ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI*2); ctx.fill();
  }
  // highlight spots catching light
  const highlightCount = 100;
  for (let i = 0; i < highlightCount; i++) {
    const x = trng()*size, y = trng()*size, r = 2 + trng()*3;
    ctx.fillStyle = '#181410';
    ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI*2); ctx.fill();
  }

  if (isVisible) {
    const paths = generateCrackPaths(seed ^ 0x51ed270b, size/2, size/2, size*0.42);
    for (const pts of paths) {
      // wide warm halo underneath, then a thin dark groove on top — reads
      // as a carved crack with a bit of depth rather than a flat line.
      ctx.strokeStyle = 'rgba(58,10,0,0.9)';
      ctx.lineWidth = 7; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
      ctx.beginPath();
      ctx.moveTo(pts[0].x, pts[0].y);
      for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i].x, pts[i].y);
      ctx.stroke();

      ctx.strokeStyle = '#000000';
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(pts[0].x, pts[0].y);
      for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i].x, pts[i].y);
      ctx.stroke();
    }
  }

  // dark edge vignette — the outer 20% of the canvas fades toward near-black
  // so adjacent boulders read as separate rocks instead of blending together.
  const vignette = ctx.createRadialGradient(size/2, size/2, size*0.4, size/2, size/2, size*0.5);
  vignette.addColorStop(0, 'rgba(3,2,2,0)');
  vignette.addColorStop(1, '#030202');
  ctx.fillStyle = vignette;
  ctx.fillRect(0, 0, size, size);

  const tex = new THREE.CanvasTexture(cnv);
  tex.needsUpdate = true;
  return tex;
}

function makeCrackGlowTexture(seed){
  const size = 256;
  const paths = generateCrackPaths(seed ^ 0x51ed270b, size/2, size/2, size*0.42); // same transform as the groove pass above, so patterns match exactly

  // RGB is baked on one canvas, and normalized distance-from-origin (for the
  // tap fill-reveal) is baked as grayscale on a second — then merged so the
  // final texture's alpha channel carries distance instead of transparency.
  const colorCnv = document.createElement('canvas'); colorCnv.width = colorCnv.height = size;
  const colorCtx = colorCnv.getContext('2d');
  const distCnv = document.createElement('canvas'); distCnv.width = distCnv.height = size;
  const distCtx = distCnv.getContext('2d');

  const c0 = [0xcc,0x22,0x00], c1 = [0xff,0x44,0x00];
  for (const pts of paths) {
    for (let i = 1; i < pts.length; i++) {
      const p0 = pts[i-1], p1 = pts[i];
      const dAvg = (p0.d + p1.d) * 0.5;
      const r = Math.round(c0[0] + (c1[0]-c0[0])*dAvg);
      const g = Math.round(c0[1] + (c1[1]-c0[1])*dAvg);
      const b = Math.round(c0[2] + (c1[2]-c0[2])*dAvg);
      colorCtx.strokeStyle = `rgb(${r},${g},${b})`;
      colorCtx.lineWidth = 4; colorCtx.lineCap = 'round'; colorCtx.lineJoin = 'round';
      colorCtx.beginPath();
      colorCtx.moveTo(p0.x, p0.y);
      colorCtx.lineTo(p1.x, p1.y);
      colorCtx.stroke();

      const distByte = Math.max(1, Math.round(dAvg*255));
      distCtx.strokeStyle = `rgb(${distByte},${distByte},${distByte})`;
      distCtx.lineWidth = 4; distCtx.lineCap = 'round'; distCtx.lineJoin = 'round';
      distCtx.beginPath();
      distCtx.moveTo(p0.x, p0.y);
      distCtx.lineTo(p1.x, p1.y);
      distCtx.stroke();
    }
  }

  const colorData = colorCtx.getImageData(0, 0, size, size);
  const distData = distCtx.getImageData(0, 0, size, size);
  const out = colorCtx.createImageData(size, size);
  for (let i = 0; i < size*size; i++) {
    const o = i*4;
    const hasCrack = distData.data[o+3] > 0;
    out.data[o]   = colorData.data[o];
    out.data[o+1] = colorData.data[o+1];
    out.data[o+2] = colorData.data[o+2];
    out.data[o+3] = hasCrack ? distData.data[o] : 0;
  }
  const outCnv = document.createElement('canvas'); outCnv.width = outCnv.height = size;
  outCnv.getContext('2d').putImageData(out, 0, 0);

  const tex = new THREE.CanvasTexture(outCnv);
  tex.needsUpdate = true;
  return tex;
}

const VISIBLE_X = 4.62;
const visibleBoulderIdx = [];
boulderDefs.forEach((b, i) => { if (Math.abs(b.x) <= VISIBLE_X && Math.abs(b.z) <= ORTHO_H) visibleBoulderIdx.push(i); });

const ATLAS_CELL = 256;
const atlasCols = Math.max(1, Math.ceil(Math.sqrt(visibleBoulderIdx.length + 1)));
const atlasRows = Math.max(1, Math.ceil((visibleBoulderIdx.length + 1) / atlasCols));

atlasCanvas.width = atlasCols * ATLAS_CELL; atlasCanvas.height = atlasRows * ATLAS_CELL;
const atlasCtx = atlasCanvas.getContext('2d');
const glowAtlasCanvas = document.createElement('canvas');
glowAtlasCanvas.width = atlasCols * ATLAS_CELL; glowAtlasCanvas.height = atlasRows * ATLAS_CELL;
const glowAtlasCtx = glowAtlasCanvas.getContext('2d');

const atlasOffsetArray = new Float32Array(boulderDefs.length * 2); // defaults to (0,0) — cell 0, the shared generic texture
const cellUvW = 1 / atlasCols, cellUvH = 1 / atlasRows;

// cell 0 — shared generic texture for every boulder outside the viewport
atlasCtx.drawImage(makeBoulderTexture(0x2c3e50, false).image, 0, 0);

visibleBoulderIdx.forEach((idx, n) => {
  const cellIndex = n + 1; // cell 0 is reserved for the shared generic texture
  const col = cellIndex % atlasCols, row = Math.floor(cellIndex / atlasCols);
  const seed = idx * CRACK_SEED_SALT + 13;
  atlasCtx.drawImage(makeBoulderTexture(seed, true).image, col*ATLAS_CELL, row*ATLAS_CELL);
  glowAtlasCtx.drawImage(makeCrackGlowTexture(seed).image, col*ATLAS_CELL, row*ATLAS_CELL);
  atlasOffsetArray[idx*2] = col * cellUvW;
  atlasOffsetArray[idx*2+1] = row * cellUvH;
});

const boulderAtlasTex = new THREE.CanvasTexture(atlasCanvas);
boulderAtlasTex.needsUpdate = true;
const crackGlowAtlasTex = new THREE.CanvasTexture(glowAtlasCanvas);
crackGlowAtlasTex.needsUpdate = true;

const boulderMaterial = new THREE.MeshStandardMaterial({
  roughness: 0.98, metalness: 0.0, flatShading: false,
});
boulderMaterial.emissive = new THREE.Color(0x000000);
boulderMaterial.emissiveIntensity = 0;
boulderMaterial.onBeforeCompile = (shader) => {
  // material.map deliberately isn't used here — three's built-in map sampling
  // relies on its own internal vMapUv/MAP_UV machinery, which isn't a stable
  // thing to hook into from outside. Both atlas textures are sampled here
  // manually instead, against a self-contained varying (vAtlasUv) computed
  // from a custom attribute, so nothing depends on three's internal naming.
  shader.uniforms.uBoulderAtlas = { value: boulderAtlasTex };
  shader.uniforms.uCrackGlowAtlas = { value: crackGlowAtlasTex };
  shader.uniforms.uAtlasCellUv = { value: new THREE.Vector2(cellUvW, cellUvH) };
  shader.vertexShader = shader.vertexShader
    .replace('#include <common>', `#include <common>
      attribute float aHeat;
      attribute float aRiverGlow;
      attribute float aRiverSide;
      attribute vec2 aAtlasOffset;
      attribute float aFillLevel;
      attribute vec2 aLocalUv;
      uniform vec2 uAtlasCellUv;
      varying vec2 vAtlasUv;
      varying float vHeat;
      varying float vRiverGlow;
      varying float vRiverFacing;
      varying float vFillLevel;`)
    .replace('#include <begin_vertex>', `#include <begin_vertex>
      vHeat = aHeat;
      vRiverGlow = aRiverGlow;
      vFillLevel = aFillLevel;
      vAtlasUv = aAtlasOffset + aLocalUv * uAtlasCellUv;
      vec3 outwardDir = normalize(mat3(instanceMatrix) * normalize(position));
      vRiverFacing = max(0.0, outwardDir.x * aRiverSide);`);
  shader.fragmentShader = shader.fragmentShader
    .replace('#include <common>', `#include <common>
      uniform sampler2D uBoulderAtlas;
      uniform sampler2D uCrackGlowAtlas;
      varying vec2 vAtlasUv;
      varying float vHeat;
      varying float vRiverGlow;
      varying float vRiverFacing;
      varying float vFillLevel;`)
    .replace('#include <color_fragment>', `#include <color_fragment>
      // sampled manually (see note above), so the sRGB->linear decode that
      // three's automatic map pipeline would normally apply has to happen
      // here by hand, or the baked texture reads too dark/flat. This is the
      // same piecewise curve three.js itself uses (a plain pow(2.2) over-
      // darkens the low end and crushes the texture's low-contrast detail).
      vec3 texRaw = texture2D(uBoulderAtlas, vAtlasUv).rgb;
      vec3 texLinear = mix(texRaw * 0.0773993808, pow(texRaw * 0.9478672986 + 0.0521327014, vec3(2.4)), step(vec3(0.04045), texRaw));
      diffuseColor.rgb = texLinear;`)
    .replace('#include <emissivemap_fragment>', `#include <emissivemap_fragment>
      float h = clamp(vHeat, 0.0, 1.0);
      vec3 riverGlowColor = vec3(0.48,0.055,0.03);
      totalEmissiveRadiance += riverGlowColor * vRiverGlow * vRiverFacing * 0.425;
      // baseline visibility floor — without this, this dark an albedo gets
      // crushed to pure black by the tone curve tuned for the bright lava.
      totalEmissiveRadiance += vec3(0.04, 0.03, 0.025);
      vec4 crackGlow = texture2D(uCrackGlowAtlas, vAtlasUv);
      float crackShow = step(0.0002, crackGlow.a) * step(crackGlow.a, vFillLevel);
      totalEmissiveRadiance += crackGlow.rgb * crackShow;`);
};

const boulderMesh = new THREE.InstancedMesh(boulderGeo, boulderMaterial, boulderDefs.length);
const heatArray = new Float32Array(boulderDefs.length);
const riverGlowArray = new Float32Array(boulderDefs.length);
const riverSideArray = new Float32Array(boulderDefs.length);
const fillLevelArray = new Float32Array(boulderDefs.length);
{
  const dummy = new THREE.Object3D();
  boulderDefs.forEach((b, i) => {
    const sy = b.radius * range(0.55, 0.8);
    const sx = b.radius * range(0.9, 1.1);
    const sz = b.radius * range(0.9, 1.1);
    const y = sy * 0.32;
    b.y = y;
    dummy.position.set(b.x, y, b.z);
    dummy.rotation.set(range(-0.45,0.45), range(0,Math.PI*2), range(-0.45,0.45));
    dummy.scale.set(sx, sy, sz);
    dummy.updateMatrix();
    boulderMesh.setMatrixAt(i, dummy.matrix);

    // Ambient heat-radiating glow for boulders sitting right at the bank —
    // faint and static, distinct from the interactive tap/hold warmth above.
    const cx = centerX(b.z), hw = riverHalfWidthNominal(b.z);
    const gapToEdge = Math.abs(b.x - cx) - hw - b.radius;
    riverGlowArray[i] = Math.max(0, Math.min(1, 1 - gapToEdge / 0.75));
    riverSideArray[i] = (cx - b.x) >= 0 ? 1 : -1;
  });
}
boulderGeo.setAttribute('aLocalUv', boulderGeo.attributes.uv);
boulderGeo.setAttribute('aHeat', new THREE.InstancedBufferAttribute(heatArray, 1));
boulderGeo.setAttribute('aRiverGlow', new THREE.InstancedBufferAttribute(riverGlowArray, 1));
boulderGeo.setAttribute('aRiverSide', new THREE.InstancedBufferAttribute(riverSideArray, 1));
boulderGeo.setAttribute('aAtlasOffset', new THREE.InstancedBufferAttribute(atlasOffsetArray, 2));
boulderGeo.setAttribute('aFillLevel', new THREE.InstancedBufferAttribute(fillLevelArray, 1));
scene.add(boulderMesh);

// ── Boulder crack system — per-instance fill level sweeps outward from the
// tapped point through the baked crack-glow atlas, like molten lava surging
// out through the fracture. Timing/trigger logic is unchanged from before —
// only the render target changed (a per-instance attribute instead of a
// per-mesh uniform), since all boulders now share one InstancedMesh.
const activeCracks = [];   // { id, startTime }
const HEAT_DECAY = 0.16;
const FILL_REST = 0;

function triggerCrack(id, hitPoint){
  const existing = activeCracks.find(c => c.id === id);
  if (existing) {
    existing.startTime = performance.now();
  } else {
    activeCracks.push({ id, startTime: performance.now() });
    if (activeCracks.length > 36) {
      const old = activeCracks.shift();
      fillLevelArray[old.id] = FILL_REST;
      boulderGeo.attributes.aFillLevel.needsUpdate = true;
    }
  }
  heatArray[id] = 1.0;
}

function handleBoulderTap(id){
  heatArray[id] = Math.min(0.5, heatArray[id] + 0.25);
}

function updateBoulderHeat(dt){
  let changed = false;
  for (let i = 0; i < heatArray.length; i++) {
    if (heatArray[i] > 0) {
      heatArray[i] = Math.max(0, heatArray[i] - dt*HEAT_DECAY);
      changed = true;
    }
  }
  if (changed) boulderGeo.attributes.aHeat.needsUpdate = true;
  const now = performance.now();
  let fillChanged = false;
  for (let i = activeCracks.length - 1; i >= 0; i--) {
    const c = activeCracks[i];
    const elapsed = (now - c.startTime) / 1000;
    const fillDur  = 1.5;
    const holdDur  = 1.0;
    const drainDur = 4.0;
    let level = FILL_REST;
    if (elapsed < fillDur) {
      level = elapsed / fillDur;
    } else if (elapsed < fillDur + holdDur) {
      level = 1.0;
    } else if (elapsed < fillDur + holdDur + drainDur) {
      level = 1.0 - (elapsed - fillDur - holdDur) / drainDur;
    } else {
      fillLevelArray[c.id] = FILL_REST;
      fillChanged = true;
      activeCracks.splice(i, 1);
      continue;
    }
    fillLevelArray[c.id] = level;
    fillChanged = true;
  }
  if (fillChanged) boulderGeo.attributes.aFillLevel.needsUpdate = true;
}

// ── Bubbles: grow, swell, pop with splash ─────────────────────────────────────
// Unlit dome shader: darker crown, subtly brighter rim (object-space normal.y,
// not view-dependent) — reads as a thick lava bulge rather than a flat disc,
// and can never produce a lit specular hotspot.
const bubbleGeo = new THREE.SphereGeometry(1, 12, 8);
const bubbleShadowTex = makeRadialTexture('rgba(4,1,1,0.5)', 'rgba(4,1,1,0)');
const MAX_BUBBLES = 5;
const bubblePool = [];
function makeBubbleMaterial(){
  const t = range(0, 1);
  const center = new THREE.Color(0x3a0605).lerp(new THREE.Color(0x450806), t);
  const rim    = new THREE.Color(0x520c07).lerp(new THREE.Color(0x5e0e09), t);
  return new THREE.ShaderMaterial({
    uniforms: { uCenter: { value: center }, uRim: { value: rim } },
    vertexShader: `
      varying vec3 vN;
      void main(){
        vN = normalize(normal);
        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
      }
    `,
    fragmentShader: `
      precision mediump float;
      varying vec3 vN;
      uniform vec3 uCenter;
      uniform vec3 uRim;
      void main(){
        float rim = pow(1.0 - clamp(vN.y, 0.0, 1.0), 1.6);
        vec3 linearColor = mix(uCenter, uRim, rim);
        // this material bypasses the standard material chunks, so it needs
        // its own brightness boost or it renders far too dark (near-black)
        // and blends into the lava — a uniform multiplier (not a pow curve)
        // keeps the R:G:B ratio intact so the bubble stays dark crimson
        // instead of washing out toward gray/white.
        gl_FragColor = vec4(clamp(linearColor * 4.8, 0.0, 1.0), 1.0);
      }
    `,
  });
}
for (let i = 0; i < MAX_BUBBLES; i++) {
  const mesh = new THREE.Mesh(bubbleGeo, makeBubbleMaterial());
  mesh.visible = false;
  scene.add(mesh);
  const shadowMat = new THREE.SpriteMaterial({ map: bubbleShadowTex, transparent: true, opacity: 0, depthWrite: false });
  const shadow = new THREE.Sprite(shadowMat);
  shadow.visible = false;
  scene.add(shadow);
  bubblePool.push({ mesh, shadow, active: false, data: {} });
}
let activeBubbleCount = 0;

function trySpawnBubble(){
  if (activeBubbleCount >= MAX_BUBBLES) return;
  const item = bubblePool.find(b => !b.active);
  if (!item) return;
  const z = range(-ORTHO_H*0.8, ORTHO_H*0.8);
  const x = centerX(z) + range(-0.7, 0.7) * halfWidth(z);
  const maxR = range(0.19, 0.31);
  item.active = true; activeBubbleCount++;
  item.data = { x, z, maxR, phase: 'grow', t: 0, growDur: range(2.0, 3.4), popT: 0 };
  item.mesh.visible = true;
  item.mesh.position.set(x, -maxR*0.85, z);
  item.mesh.scale.setScalar(0.001);
  item.shadow.visible = true;
  item.shadow.position.set(x, 0.015, z);
  item.shadow.material.opacity = 0;
  item.shadow.scale.setScalar(0.001);
}

function updateBubbles(dt){
  for (const item of bubblePool) {
    if (!item.active) continue;
    const d = item.data;
    if (d.phase === 'grow') {
      d.t += dt / d.growDur;
      const s = Math.min(1, d.t);
      const sm = smoothstepJS(0,1,s);
      item.mesh.scale.setScalar(Math.max(0.001, sm * d.maxR));
      item.mesh.position.y = -d.maxR*0.85 + sm*d.maxR*0.20;
      item.shadow.scale.setScalar(Math.max(0.001, sm * d.maxR * 2.1));
      item.shadow.material.opacity = sm * 0.5;
      if (d.t >= 1) { d.phase = 'pop'; d.popT = 0; }
    } else {
      d.popT += dt;
      const s = 1 + Math.min(1, d.popT/0.08) * 0.45;
      item.mesh.scale.setScalar(d.maxR * s);
      item.shadow.material.opacity = Math.max(0, 0.5 * (1 - d.popT/0.08));
      if (d.popT >= 0.08) {
        spawnSplash(d.x, d.z, 10 + Math.floor(Math.random()*5));
        item.active = false; item.mesh.visible = false; item.shadow.visible = false; activeBubbleCount--;
        setTimeout(trySpawnBubble, 200 + Math.random()*900);
      }
    }
  }
}

// ── Shared sprite textures ────────────────────────────────────────────────────
function makeRadialTexture(inner, outer, size=64){
  const cnv = document.createElement('canvas'); cnv.width = cnv.height = size;
  const ctx = cnv.getContext('2d');
  const g = ctx.createRadialGradient(size/2,size/2,0, size/2,size/2,size/2);
  g.addColorStop(0, inner);
  g.addColorStop(1, outer);
  ctx.fillStyle = g;
  ctx.fillRect(0,0,size,size);
  const tex = new THREE.CanvasTexture(cnv);
  tex.needsUpdate = true;
  return tex;
}
const splashTex = makeRadialTexture('rgba(90,10,5,0.7)', 'rgba(50,4,2,0)');
const smokeTex  = makeRadialTexture('rgba(60,8,8,0.45)', 'rgba(25,4,4,0)');

function makeSpritePool(count, texture, blending){
  const pool = [];
  for (let i = 0; i < count; i++) {
    const mat = new THREE.SpriteMaterial({ map: texture, transparent: true, opacity: 0, depthWrite: false, blending });
    const spr = new THREE.Sprite(mat);
    spr.visible = false;
    scene.add(spr);
    pool.push({ sprite: spr, active: false, data: {} });
  }
  return pool;
}
const splashPool = makeSpritePool(40, splashTex, THREE.AdditiveBlending);
const smokePool  = makeSpritePool(14, smokeTex, THREE.NormalBlending);

// ── Splash particles (bubble pops) ───────────────────────────────────────────
function spawnSplash(x, z, count){
  let spawned = 0;
  for (const item of splashPool) {
    if (item.active) continue;
    const ang = Math.random()*Math.PI*2;
    const speed = 0.5 + Math.random()*1.1;
    item.active = true;
    item.data = { x, z, vx: Math.cos(ang)*speed, vz: Math.sin(ang)*speed, life: 0, maxLife: 0.3+Math.random()*0.25, size: 0.16+Math.random()*0.16 };
    item.sprite.visible = true;
    item.sprite.position.set(x, 1.5, z);
    item.sprite.material.opacity = 0.22;
    item.sprite.scale.setScalar(item.data.size);
    spawned++;
    if (spawned >= count) break;
  }
}
function updateSplashes(dt){
  for (const item of splashPool) {
    if (!item.active) continue;
    const d = item.data;
    d.life += dt;
    const tt = d.life / d.maxLife;
    if (tt >= 1) { item.active = false; item.sprite.visible = false; continue; }
    d.x += d.vx*dt; d.z += d.vz*dt;
    item.sprite.position.set(d.x, 1.5, d.z);
    item.sprite.material.opacity = (1 - tt) * 0.22;
    item.sprite.scale.setScalar(d.size * (1 + tt*0.6));
  }
}

// ── Smoke puffs drifting off the lava ────────────────────────────────────────
let smokeTimer = 0.4;
function updateSmokeSpawning(dt){
  smokeTimer -= dt;
  if (smokeTimer <= 0) {
    smokeTimer = 0.6 + Math.random()*1.0;
    spawnSmoke();
  }
}
function spawnSmoke(){
  const item = smokePool.find(p => !p.active);
  if (!item) return;
  const z = range(-ORTHO_H*0.85, ORTHO_H*0.85);
  const x = centerX(z) + range(-0.7, 0.7) * halfWidth(z);
  item.active = true;
  item.data = {
    x, z, driftX: range(-0.05,0.05), driftZ: range(-0.02,0.06),
    life: 0, maxLife: range(3.5,5.5), startSize: range(0.35,0.55), endSize: range(1.0,1.5),
  };
  item.sprite.visible = true;
  item.sprite.position.set(x, 1.2, z);
  item.sprite.material.opacity = 0;

}
function updateSmoke(dt){
  for (const item of smokePool) {
    if (!item.active) continue;
    const d = item.data;
    d.life += dt;
    const tt = d.life / d.maxLife;
    if (tt >= 1) { item.active = false; item.sprite.visible = false; continue; }
    d.x += d.driftX*dt; d.z += d.driftZ*dt;
    const scale = d.startSize + (d.endSize - d.startSize) * tt;
    item.sprite.position.set(d.x, 1.2 + tt*1.5, d.z);

    if (tt < 0.15) alpha = tt/0.15 * 0.28;

}

// ── Drag-on-lava parting effect ──────────────────────────────────────────────

function spawnDragQuad(x, z){

// ── Input: raycasting for boulder tap/hold and river drag ───────────────────
const raycaster = new THREE.Raycaster();
const ndc = new THREE.Vector2();
function ndcFromEvent(e){
  const rect = canvas.getBoundingClientRect();
  ndc.x = Math.max(-1, Math.min(1,  ((e.clientX - rect.left) / rect.width)  * 2 - 1));
  ndc.y = Math.max(-1, Math.min(1, -((e.clientY - rect.top)  / rect.height) * 2 + 1));
  return ndc;
}
function pickBoulder(e){
  raycaster.setFromCamera(ndcFromEvent(e), camera);
  const hits = raycaster.intersectObject(boulderMesh);
  return hits.length ? hits[0] : null;
}
function pickRiver(e){
  raycaster.setFromCamera(ndcFromEvent(e), camera);
  const hits = raycaster.intersectObject(lavaMesh);
  return hits.length ? hits[0] : null;
}

let boulderDownId = null, boulderDownTime = 0, boulderDownX = 0, boulderDownY = 0;
let holdTimer = null;
const HOLD_MS = 220;
let lastBoulderHitPoint = new THREE.Vector3();

canvas.addEventListener('pointerdown', (e) => {
  const hit = pickBoulder(e);
  if (hit) {
    boulderDownId = hit.instanceId;
    boulderDownTime = performance.now();
    boulderDownX = e.clientX; boulderDownY = e.clientY;
    lastBoulderHitPoint.copy(hit.point);
    return;
  }
  const riverHit = pickRiver(e);
  if (riverHit) {
    const slotIndex = dragSlots.findIndex(s => !s.active);
    if (slotIndex !== -1) {
      const slot = dragSlots[slotIndex];
      slot.active = true; slot.pointerId = e.pointerId;
      slot.x = riverHit.point.x; slot.z = riverHit.point.z;
      dragLastSpawn[slotIndex] = { x: riverHit.point.x, z: riverHit.point.z };
      spawnDragQuad(riverHit.point.x, riverHit.point.z);
    }
  }
});

canvas.addEventListener('pointermove', (e) => {
  if (boulderDownId !== null) {
    const dx = e.clientX - boulderDownX, dy = e.clientY - boulderDownY;
    if (dx*dx + dy*dy > 400) {
      clearTimeout(holdTimer);
      boulderDownId = null;
    }
  }
  const slotIndex = dragSlots.findIndex(s => s.active && s.pointerId === e.pointerId);
  if (slotIndex !== -1) {
    const slot = dragSlots[slotIndex];
    const riverHit = pickRiver(e);
    if (riverHit) {
      slot.x = riverHit.point.x; slot.z = riverHit.point.z;
      const last = dragLastSpawn[slotIndex];
      const dx = riverHit.point.x - last.x, dz = riverHit.point.z - last.z;
      if (Math.sqrt(dx*dx + dz*dz) >= DRAG_QUAD_SPACING) {
        spawnDragQuad(riverHit.point.x, riverHit.point.z);
        dragLastSpawn[slotIndex] = { x: riverHit.point.x, z: riverHit.point.z };
      }
    }
  }
});

function releasePointer(e){
  const elapsed = performance.now() - boulderDownTime;
  clearTimeout(holdTimer);
  if (boulderDownId !== null && elapsed < HOLD_MS) {
    handleBoulderTap(boulderDownId);
    triggerCrack(boulderDownId, lastBoulderHitPoint);
  }
  boulderDownId = null;
  const slot = dragSlots.find(s => s.pointerId === e.pointerId);
  if (slot) { slot.active = false; slot.pointerId = null; }
}
window.addEventListener('pointerup', releasePointer);
window.addEventListener('pointercancel', releasePointer);

// ── Reset ─────────────────────────────────────────────────────────────────────
document.getElementById('reset-btn').addEventListener('click', () => {
  for (let i = 0; i < heatArray.length; i++) heatArray[i] = 0;
  boulderGeo.attributes.aHeat.needsUpdate = true;
  for (const c of activeCracks) { fillLevelArray[c.id] = FILL_REST; }
  boulderGeo.attributes.aFillLevel.needsUpdate = true;
  activeCracks.length = 0;
  for (const s of dragSlots) { s.active = false; s.strength = 0; s.x = 9999; s.z = 9999; s.pointerId = null; }
  for (const item of dragQuadPool) { item.life = 0; item.mesh.visible = false; item.mesh.material.opacity = 0; }
  for (let i = 0; i < dragLastSpawn.length; i++) dragLastSpawn[i] = null;
  boulderDownId = null;
  clearTimeout(holdTimer);
});

// ── Initial ambient bubbles ───────────────────────────────────────────────────
for (let i = 0; i < 4; i++) trySpawnBubble();

// ── FPS readout ───────────────────────────────────────────────────────────────
const fpsEl = document.getElementById('fps');
let fpsFrames = 0, fpsAccum = 0;

// ── Render loop ───────────────────────────────────────────────────────────────
const clock = new THREE.Clock();
renderer.setAnimationLoop(() => {
  const dt = Math.min(clock.getDelta(), 0.05);

  lavaMaterial.uniforms.uTime.value += dt;
  updateDragSlots(dt);
  updateDragQuads(dt);
  updateBoulderHeat(dt);
  updateBubbles(dt);
  if (activeBubbleCount < 4) trySpawnBubble();
  updateSmokeSpawning(dt);
  updateSmoke(dt);
  updateSplashes(dt);

  renderer.render(scene, camera);

  fpsFrames++; fpsAccum += dt;
  if (fpsAccum >= 0.5) {
    fpsEl.textContent = `${(fpsFrames/fpsAccum).toFixed(1)} fps`;
    fpsFrames = 0; fpsAccum = 0;
  }
});

// ── Console handle for future animation work ─────────────────────────────────
window.__lava = { THREE, scene, camera, renderer, boulderMesh, boulderDefs, heatArray, fillLevelArray, triggerCrack, handleBoulderTap, dragSlots, dragQuadPool, activeCracks };
</script>
</body>
